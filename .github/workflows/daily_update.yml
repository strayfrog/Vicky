name: Global Assets Intelligence Fetch

on:
  schedule:
    # 07:00 (對應 UTC 23:00): 美股最終收盤數據
    # 15:30 (對應 UTC 07:30): 台股收盤 + 三大法人籌碼數據
    - cron: '0 23 * * *'
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
      - name: Run Python Script
        run: python twse_sniper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          touch stock_data.json
          git add stock_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 偵巡更新：台美股價與法人籌碼"
          git push

      - name: 🚀 雲端空投：同步 JSON 至 Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python - << 'EOF'
          import os, json, sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          # 檢查檔案是否存在，避免程式崩潰
          file_name = 'stock_data.json'
          if not os.path.exists(file_name):
              print("❌ 找不到數據檔，跳過雲端同步。")
              sys.exit(0)

          try:
              # 解析憑證與建立 Drive 服務
              creds_json = json.loads(os.environ['GDRIVE_CREDENTIALS'])
              creds = service_account.Credentials.from_service_account_info(creds_json)
              drive_service = build('drive', 'v3', credentials=creds)
              folder_id = os.environ['FOLDER_ID']

              # 查詢 Drive 中是否已有同名檔案
              query = f"name = '{file_name}' and '{folder_id}' in parents and trashed = false"
              results = drive_service.files().list(q=query, spaces='drive', fields='files(id)').execute()
              items = results.get('files', [])

              media = MediaFileUpload(file_name, resumable=True)
              
              if items:
                  # 若檔案已存在，則執行覆蓋更新 (保持同一檔案網址與 ID)
                  file_id = items[0]['id']
                  drive_service.files().update(fileId=file_id, media_body=media).execute()
                  print(f"✅ 檔案已成功覆蓋更新至 Google Drive: {file_name}")
              else:
                  # 若檔案不存在，則新建檔案
                  file_metadata = {'name': file_name, 'parents': [folder_id]}
                  drive_service.files().create(body=file_metadata, media_body=media, fields='id').execute()
                  print(f"✅ 檔案已成功新建至 Google Drive: {file_name}")
          except Exception as e:
              print(f"❌ Google Drive 同步過程發生異常: {e}")
              sys.exit(1)
          EOF

